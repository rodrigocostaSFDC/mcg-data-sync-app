sftp.mode=remote

# Telmex SFTP Configuration
sftp.preprocessor.telmex.host=${SFTP_TELMEX_HOST}
sftp.preprocessor.telmex.port=${SFTP_TELMEX_PORT:22}
sftp.preprocessor.telmex.username=${SFTP_TELMEX_USERNAME}
sftp.preprocessor.telmex.password=${SFTP_TELMEX_PASSWORD}
sftp.preprocessor.telmex.private-key=${SFTP_TELMEX_PRIVATE_KEY:}
sftp.preprocessor.telmex.passphrase=${SFTP_TELMEX_PASSPHRASE:}
sftp.preprocessor.telmex.known-hosts=${SFTP_TELMEX_KNOWN_HOSTS:}
sftp.preprocessor.telmex.allow-unknown-keys=${SFTP_TELMEX_ALLOW_UNKNOWN_KEYS:true}
sftp.preprocessor.telmex.input-dir=${SFTP_TELMEX_INPUT_DIR:/}
# Output dir must match MC File Drop import path (enriched files are .txt). Default /processed.
# If MC doesn't detect files, set PREPROCESSOR_OUTPUT_TIMESTAMP_SUFFIX=true (new filename per run).
sftp.preprocessor.telmex.output-dir=${SFTP_TELMEX_OUTPUT_DIR:/}
sftp.preprocessor.telmex.subfolder=${SFTP_TELMEX_PROCESSED_SUBFOLDER:/}
# Glob for basenames; only .zip / .txt are listed/processed.
sftp.preprocessor.telmex.file-pattern=${SFTP_TELMEX_FILE_PATTERN:*_S_*}

# Telnor SFTP Configuration
sftp.preprocessor.telnor.host=${SFTP_TELNOR_HOST}
sftp.preprocessor.telnor.port=${SFTP_TELNOR_PORT:22}
sftp.preprocessor.telnor.username=${SFTP_TELNOR_USERNAME}
sftp.preprocessor.telnor.password=${SFTP_TELNOR_PASSWORD}
sftp.preprocessor.telnor.private-key=${SFTP_TELNOR_PRIVATE_KEY:}
sftp.preprocessor.telnor.passphrase=${SFTP_TELNOR_PASSPHRASE:}
sftp.preprocessor.telnor.known-hosts=${SFTP_TELNOR_KNOWN_HOSTS:}
sftp.preprocessor.telnor.allow-unknown-keys=${SFTP_TELNOR_ALLOW_UNKNOWN_KEYS:true}
sftp.preprocessor.telnor.input-dir=${SFTP_TELNOR_INPUT_DIR:/}
# Output dir must MC File Drop import path (enriched files are .txt). Default /processed.
# If MC doesn't de files, set PREPROCESSOR_OUTPUT_TIMESTAMP_SUFFIX=true (new filename per run).
sftp.preprocessor.telnor.output-dir=${SFTP_TELNOR_OUTPUT_DIR:/}
sftp.preprocessor.telnor.subfolder=${SFTP_TELNOR_PROCESSED_SUBFOLDER:/}
# Glob for basenam only .zip / .txt are listed/processed.
sftp.preprocessor.telnor.file-pattern=${SFTP_TELNOR_FILE_PATTERN:*_S_*}


logging.level.root=INFO
logging.level.com.salesforce.mcg.datasync=INFO
logging.level.org.springframework.batch.core.step.item.ChunkMonitor=ERROR
